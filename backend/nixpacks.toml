[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

# Migrations run as a pre-deploy/release step (see Procfile `release:` and the
# Railway dashboard Pre-Deploy command), where $PORT and networking are
# available — not bundled into the start command.
[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
